<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ميتا سبيس - إعادة تعيين كلمة المرور</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../dist/output.css" />
  </head>
  <body>
    <section class="login flex justify-center items-center min-h-[100vh] py-6">
      <div class="container mx-auto px-4">
        <div
          class="card backdrop-blur-[16px] relative z-[1] w-full max-w-[650px] mx-auto rounded-[16px] px-6 py-8 sm:px-10 sm:py-10 md:px-20 shadow-[0_30px_80px_rgba(0,0,0,0.3)] transition-[box-shadow,border-color] duration-[400ms] hover:shadow-[0_36px_90px_rgba(0,0,0,0.35),0_0_60px_rgba(249,168,37,0.07)]"
        >
          <!-- Logo -->
          <div class="anim-1 flex flex-col items-center mb-6 sm:mb-10">
            <img
              src="../assets/logo.png"
              alt="شعار"
              class="w-28 sm:w-36 md:w-auto"
            />
          </div>

          <!-- Title + Subtitle -->
          <div class="anim-2 text-center mb-[25px]">
            <h1
              class="text-white text-[26px] sm:text-[30px] md:text-[36px] leading-[100%] font-medium mb-3"
            >
              إعادة تعيين كلمة المرور
            </h1>
            <p
              class="text-[rgba(255,255,255,0.55)] text-[13px] sm:text-[14px] leading-relaxed"
            >
              أدخل كلمة مرور جديدة لحسابك.
            </p>
          </div>

          <!-- New Password -->
          <div class="anim-3 mb-4 relative">
            <label
              class="block text-[rgba(255,255,255,0.88)] text-[12px] sm:text-[13px] font-normal mb-2 tracking-[0.2px]"
              for="newPasswordInput"
            >
              كلمة المرور الجديدة
            </label>
            <div class="relative">
              <input
                type="password"
                id="newPasswordInput"
                placeholder="أدخل كلمة المرور الجديدة"
                class="w-full bg-[rgba(255,255,255,0.88)] border-2 border-transparent rounded-[16px] px-3 py-2.5 sm:px-4 sm:py-3 text-sm sm:text-base text-[#bcbec0] outline-none shadow-[0_2px_8px_rgba(0,0,0,0.08)] transition-[background,border-color,box-shadow,transform] duration-300 placeholder:text-[#9eb0c8] hover:[&:not(:focus)]:bg-[rgba(255,255,255,0.96)] hover:[&:not(:focus)]:border-[rgba(255,255,255,0.5)] hover:[&:not(:focus)]:shadow-[0_4px_16px_rgba(0,0,0,0.12)] focus:bg-[rgba(255,255,255,0.99)] focus:border-[#f9a825] focus:shadow-[0_0_0_4px_rgba(249,168,37,0.16),0_0_22px_rgba(249,168,37,0.14),0_4px_18px_rgba(0,0,0,0.12)] focus:-translate-y-px"
              />
              <button
                id="eyeBtnNew"
                aria-label="إظهار كلمة المرور الجديدة"
                class="eye-btn absolute left-[13px] right-auto top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer p-1 text-[#9eb0c8] rounded-[6px] flex items-center justify-center transition-[color,background] duration-200 hover:text-[#1565c0] hover:bg-[rgba(21,101,192,0.1)]"
              >
                <svg
                  id="eyeShowNew"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5 block"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  id="eyeHideNew"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5 block"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <div class="strength-bar-wrap">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <p class="strength-label" id="strengthLabel"></p>
          </div>

          <!-- Confirm Password -->
          <div class="anim-4 mb-6 relative">
            <label
              class="block text-[rgba(255,255,255,0.88)] text-[12px] sm:text-[13px] font-normal mb-2 tracking-[0.2px]"
              for="confirmPasswordInput"
            >
              تأكيد كلمة المرور
            </label>
            <div class="relative">
              <input
                type="password"
                id="confirmPasswordInput"
                placeholder="أعد إدخال كلمة المرور"
                class="w-full bg-[rgba(255,255,255,0.88)] border-2 border-transparent rounded-[16px] px-3 py-2.5 sm:px-4 sm:py-3 text-sm sm:text-base text-[#bcbec0] outline-none shadow-[0_2px_8px_rgba(0,0,0,0.08)] transition-[background,border-color,box-shadow,transform] duration-300 placeholder:text-[#9eb0c8] hover:[&:not(:focus)]:bg-[rgba(255,255,255,0.96)] hover:[&:not(:focus)]:border-[rgba(255,255,255,0.5)] hover:[&:not(:focus)]:shadow-[0_4px_16px_rgba(0,0,0,0.12)] focus:bg-[rgba(255,255,255,0.99)] focus:border-[#f9a825] focus:shadow-[0_0_0_4px_rgba(249,168,37,0.16),0_0_22px_rgba(249,168,37,0.14),0_4px_18px_rgba(0,0,0,0.12)] focus:-translate-y-px"
              />
              <button
                id="eyeBtnConfirm"
                aria-label="إظهار تأكيد كلمة المرور"
                class="eye-btn absolute left-[13px] right-auto top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer p-1 text-[#9eb0c8] rounded-[6px] flex items-center justify-center transition-[color,background] duration-200 hover:text-[#1565c0] hover:bg-[rgba(21,101,192,0.1)]"
              >
                <svg
                  id="eyeShowConfirm"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5 block"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  id="eyeHideConfirm"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5 block"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <p class="match-label" id="matchLabel"></p>
          </div>

          <!-- Submit -->
          <div class="anim-5 mb-3">
            <button
              id="resetSubmitBtn"
              class="btn-signin w-full bg-[linear-gradient(105deg,#f9a825,#fb8c00)] border-0 rounded-[16px] py-3 sm:py-[14px] text-sm sm:text-base font-semibold text-white cursor-pointer relative overflow-hidden transition-[transform,box-shadow,filter] duration-200 shadow-[0_6px_22px_rgba(249,168,37,0.42),0_2px_6px_rgba(0,0,0,0.12)] tracking-[0.5px] hover:-translate-y-[3px] hover:shadow-[0_14px_36px_rgba(249,168,37,0.52),0_4px_12px_rgba(0,0,0,0.14)] hover:brightness-[1.06] active:-translate-y-px"
            >
              تحديث كلمة المرور
            </button>
          </div>

          <!-- Back to login -->
          <div
            class="anim-6 flex flex-wrap items-center justify-center gap-[6px] text-xs sm:text-sm text-[rgba(255,255,255,0.6)] mt-5"
          >
            <span>تذكرت كلمة المرور؟</span>
            <a
              href="/"
              class="register-link text-[#ffd54f] font-semibold no-underline relative pb-[2px] transition-[color,letter-spacing] duration-200 hover:text-white hover:tracking-[0.4px]"
            >
              تسجيل الدخول ←
            </a>
          </div>
        </div>
      </div>
    </section>

    <script>
      // ── Eye toggles ──
      function setupEye(btnId, inputId, showId, hideId) {
        const btn = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        const show = document.getElementById(showId);
        const hide = document.getElementById(hideId);
        let visible = false;
        btn.addEventListener("click", () => {
          visible = !visible;
          input.type = visible ? "text" : "password";
          show.style.display = visible ? "none" : "block";
          hide.style.display = visible ? "block" : "none";
        });
      }
      setupEye("eyeBtnNew", "newPasswordInput", "eyeShowNew", "eyeHideNew");
      setupEye(
        "eyeBtnConfirm",
        "confirmPasswordInput",
        "eyeShowConfirm",
        "eyeHideConfirm",
      );

      // ── Password strength ──
      const newPassInput = document.getElementById("newPasswordInput");
      const strengthBar = document.getElementById("strengthBar");
      const strengthLabel = document.getElementById("strengthLabel");

      const strengthLevels = [
        { label: "", color: "transparent", width: "0%" },
        { label: "ضعيفة", color: "#f22828", width: "25%" },
        { label: "مقبولة", color: "#fb8c00", width: "50%" },
        { label: "قوية", color: "#1be224", width: "100%" },
      ];

      function getStrength(pw) {
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        return score;
      }

      newPassInput.addEventListener("input", () => {
        const pw = newPassInput.value;
        const lvl = strengthLevels[pw.length === 0 ? 0 : getStrength(pw)];
        strengthBar.style.width = lvl.width;
        strengthBar.style.background = lvl.color;
        strengthLabel.textContent = lvl.label;
        strengthLabel.style.color = lvl.color;
        checkMatch();
      });

      // ── Confirm match ──
      const confirmInput = document.getElementById("confirmPasswordInput");
      const matchLabel = document.getElementById("matchLabel");

      function checkMatch() {
        const cpw = confirmInput.value;
        if (!cpw) {
          matchLabel.textContent = "";
          confirmInput.style.borderColor = "transparent";
          return;
        }
        if (newPassInput.value === cpw) {
          matchLabel.textContent = "✓ كلمتا المرور متطابقتان";
          matchLabel.style.color = "#1be224";
          confirmInput.style.borderColor = "#43a047";
        } else {
          matchLabel.textContent = "✗ كلمتا المرور غير متطابقتين";
          matchLabel.style.color = "#f22828";
          confirmInput.style.borderColor = "#f22828";
        }
      }
      confirmInput.addEventListener("input", checkMatch);
    </script>
  </body>
</html>
